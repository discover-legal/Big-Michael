version: "3.9"

# Big Michael dev stack
#
# Included services:
#   qdrant    — vector DB for agent registry, knowledge store, inter-round memory
#   docuseal  — self-hosted e-signature (http://localhost:3000, admin@localhost/admin123)
#
# Infisical (secrets manager) requires its own docker compose setup — see:
#   https://infisical.com/docs/self-hosting/docker-compose
#
# Quick start:
#   docker compose up -d
#
# Swap qdrant → ruvnet/ruvector once a stable Docker image is published:
# https://github.com/ruvnet/RuVector

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: big-michael-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  docuseal:
    image: docuseal/docuseal:latest
    container_name: big-michael-docuseal
    ports:
      - "3000:3000"
    volumes:
      - docuseal_data:/data
    environment:
      # Change this in production — used to sign session tokens
      SECRET_KEY_BASE: "changeme-use-openssl-rand-hex-64-in-production"
      # Default admin credentials for first login — change immediately
      DOCUSEAL_ADMIN_EMAIL: "admin@localhost"
      DOCUSEAL_ADMIN_PASSWORD: "admin123"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  docuseal_data:
